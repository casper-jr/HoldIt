# Self-hosted Airflow (LocalExecutor) — the only orchestrator. Cloud Composer was
# rejected at ~$300/mo for a weekly DAG; this costs nothing and shows the same skill.
# Minimal footprint: a Postgres metadata DB plus scheduler + webserver. No Celery/
# Redis — LocalExecutor is right for ~1200 rows/week.
---
x-airflow-common: &airflow-common
  image: holdit/airflow:2.9.3        # built from ./Dockerfile (base + ingestion deps)
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # ingestion + BigQuery load run in-container; auth via the mounted host ADC.
    GCP_PROJECT: project-d8b33f7e-68af-4f6b-978
    GOOGLE_CLOUD_PROJECT: project-d8b33f7e-68af-4f6b-978
    HOLDIT_RAW_BUCKET: holdit-raw
    PYTHONPATH: /opt/airflow
    GOOGLE_APPLICATION_CREDENTIALS: /home/airflow/.config/gcloud/application_default_credentials.json
    DBT_PROFILES_DIR: /opt/airflow/dbt              # profiles.yml lives in the project dir
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ../ingestion:/opt/airflow/ingestion            # the ingestion CLI, mounted (not baked)
    - ../dbt:/opt/airflow/dbt                        # the dbt project, mounted (not baked)
    - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro   # host ADC, read-only
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    # Use the image's own entrypoint (it registers the runtime UID in /etc/passwd,
    # which a custom bash entrypoint would skip) and let its bootstrap env vars do
    # the db migrate + admin user create.
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    restart: on-failure

  scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres-db:
